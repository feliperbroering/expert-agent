steps:
  - name: "gcr.io/cloud-builders/docker"
    env:
      - "DOCKER_BUILDKIT=1"
    args:
      - "build"
      - "-t"
      - "${_IMAGE}"
      - "--build-arg"
      - "BUILDKIT_INLINE_CACHE=1"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_IMAGE}"]

images:
  - "${_IMAGE}"

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY

timeout: "1800s"

substitutions:
  # Override with `--substitutions` (e.g. `_IMAGE=...`) in `gcloud builds submit`.
  # Example default uses `$PROJECT_ID` (auto-injected by Cloud Build). Pin a real
  # tag (semver) per release; never ship `latest` to production.
  _IMAGE: "southamerica-east1-docker.pkg.dev/$PROJECT_ID/expert-agent/backend:dev"
